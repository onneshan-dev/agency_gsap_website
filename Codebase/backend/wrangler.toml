name = "agency-gsap-api"
main = "src/index.ts"
compatibility_date = "2024-03-01"
compatibility_flags = ["nodejs_compat"]

[env.production]
routes = [
  { pattern = "api.onneshon.dev/*", zone_name = "onneshon.dev" }
]

# Environment variables (add your secrets via: wrangler secret put NAME)
[vars]
SUPABASE_URL = ""
RESEND_API_KEY = ""
WHATSAPP_API_KEY = ""

# Secrets (use: wrangler secret put <name> for these)
# SUPABASE_SERVICE_ROLE_KEY
# JWT_SECRET

[[d1_databases]]
binding = "DB"
database_name = "agency-db"
database_id = ""  # Will be created